<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>digital clock</title>
</head>
<style>
.dc{
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background-color: rgb(173, 27, 76);
    color: white;
    text-align: center;
    margin-top: 100px;
}
body{
    justify-content: center;
    align-items: center;
    display: flex;
    background-color: pink;
}






</style>
<body>
   <div class="dc">
        <h1 style="padding-top: 10%;">Digital Clock</h1>
        <h2 id="clock"></h2>
   </div>
    
</body>
<script>
function updateClock(){
let head=document.getElementById("clock")
let now=new Date()
let hours=now.getHours();
let minutes=now.getMinutes();
let seconds=now.getSeconds();
head.textContent= hours + ":" + minutes + ":" + seconds;

}

setInterval(updateClock, 1000);








</script>
</html>
